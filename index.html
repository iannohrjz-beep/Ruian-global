<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruian Global - Task Platform</title>
<style>
body { font-family: Arial, sans-serif; background: #f2f2f2; margin:0; padding:0;}
header { background: #ff4b2b; color:#fff; padding:20px; text-align:center; font-size:2em; font-weight:bold;}
.container { max-width:1200px; margin:20px auto; padding:0 20px;}
.task-feed { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:15px;}
.task-card { background:#fff; padding:15px; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.1); transition: transform 0.3s;}
.task-card:hover { transform: translateY(-5px);}
.task-title { font-weight:bold; font-size:1.2em;}
.task-badge { display:inline-block; padding:3px 8px; border-radius:8px; color:#fff; font-weight:bold; margin-top:5px; font-size:0.9em;}
.low-task { background: #95a5a6; }
.medium-task { background: #3498db; }
.high-task { background: #f1c40f; color:#000;}
.vip-task { background: #e74c3c;}
.task-details { margin:10px 0; }
.task-action { display:flex; flex-direction:column; }
.task-action input, .task-action select { margin:5px 0; padding:5px; border-radius:5px; border:1px solid #ccc;}
.task-action button { background:#ff4b2b; color:#fff; border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold;}
.wallets { margin-top:20px; display:flex; gap:20px; justify-content:center;}
.wallet { background:#fff; padding:15px; border-radius:12px; box-shadow:0 5px 10px rgba(0,0,0,0.1); text-align:center;}
.progress-bar { background:#eee; border-radius:8px; overflow:hidden; height:15px; margin-top:5px;}
.progress { background:#ff4b2b; height:100%; width:0%; transition:0.5s;}
.testimonial-popup { position: fixed; bottom:20px; right:20px; background:#3498db; color:#fff; padding:15px; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.2); display:flex; align-items:center; opacity:0; transform:translateY(50px); transition:all 0.5s;}
.testimonial-avatar { width:30px; height:30px; border-radius:50%; margin-right:10px; border:2px solid #fff;}
.admin-panel { display:none; background:#fff; padding:20px; border-radius:12px; margin-bottom:20px; box-shadow:0 5px 15px rgba(0,0,0,0.2);}
.login-section { background:#fff; padding:20px; border-radius:12px; max-width:400px; margin:20px auto; box-shadow:0 5px 15px rgba(0,0,0,0.2);}
.login-section input { width:100%; margin:5px 0; padding:10px; border-radius:8px; border:1px solid #ccc;}
.login-section button { background:#ff4b2b; color:#fff; border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold; width:100%;}
</style>
</head>
<body>

<header>Ruian Global</header>
<div class="container">

<!-- Login Section -->
<div class="login-section" id="loginSection">
<h2>Login</h2>
<input type="text" id="loginNumber" placeholder="Enter number/email">
<input type="password" id="loginPassword" placeholder="Enter password">
<button onclick="login()">Login</button>
</div>

<!-- Admin Panel -->
<div class="admin-panel" id="adminPanel">
<h2>Admin Chamber</h2>
<p>Admin Wallet: <span id="adminWallet">0 KES</span></p>
<p>Total Tasks Posted: <span id="totalTasks">0</span></p>
<p>Total Performers: <span id="totalPerformers">0</span></p>
</div>

<!-- Poster Task Form -->
<section class="task-card" id="taskFormSection" style="display:none;">
<h2 class="task-title">Post a Task</h2>
<div class="task-action">
<label>Platform</label>
<select id="platform">
<option value="Instagram">Instagram</option>
<option value="Facebook">Facebook</option>
<option value="TikTok">TikTok</option>
<option value="YouTube Like">YouTube Like</option>
<option value="YouTube Subscriber">YouTube Subscriber</option>
<option value="YouTube View">YouTube View</option>
<option value="Viral Video">Viral Video</option>
</select>
<label>Task Description</label>
<input type="text" id="taskDesc" placeholder="Enter post link or description">
<label>Target Actions</label>
<input type="number" id="targetNumber" placeholder="e.g., 250">
<label>Manual Price Tag (KES)</label>
<input type="number" id="priceTag" placeholder="Enter amount">
<button onclick="postTask()">Post Task</button>
</div>
</section>

<!-- Task Feed -->
<section class="task-feed" id="taskFeed" style="display:none;"></section>

<!-- Performer Wallet -->
<div class="wallets" id="walletSection" style="display:none;">
<div class="wallet">
<h3>Performer Wallet</h3>
<span id="performerWallet">0 KES</span>
</div>
</div>

<!-- Testimonials -->
<div class="testimonial-popup" id="testimonialPopup"><img src="https://i.pravatar.cc/30" class="testimonial-avatar"><span id="testimonialText"></span></div>

</div>

<script>
// Admin / user data
let adminWallet = 0, performerWallet = 0, totalTasks=0, totalPerformers=0;
let firstLoginDone = localStorage.getItem('ruianAdmin') || false;
let isAdmin = false;

// Testimonials
const testimonials = [
{avatar:'https://i.pravatar.cc/30?img=5', text:"John posted a task for 250 Instagram likes — completed within hours! 🎉"},
{avatar:'https://i.pravatar.cc/30?img=6', text:"Maria’s TikTok video went viral — 10k views in a day! 🔥"},
{avatar:'https://i.pravatar.cc/30?img=7', text:"VIP task completed in 3 hours! 🏆"},
{avatar:'https://i.pravatar.cc/30?img=8', text:"David got 500 Facebook followers — everyone happy 😎"},
{avatar:'https://i.pravatar.cc/30?img=9', text:"Sarah’s YouTube video gained 5k views! 🚀"}
];
let testIndex=0;

function login(){
  const num = document.getElementById('loginNumber').value;
  const pass = document.getElementById('loginPassword').value;
  if(!num || !pass){ alert("Enter credentials"); return;}

  // First login becomes admin
  if(!firstLoginDone){
    isAdmin = true;
    localStorage.setItem('ruianAdmin', num); // store admin identity locally
    firstLoginDone = true;
    alert("You are now Admin!");
  } else {
    const storedAdmin = localStorage.getItem('ruianAdmin');
    if(num === storedAdmin){ isAdmin = true; alert("Welcome back Admin!"); }
    else { isAdmin = false; alert("Logged in as User"); }
  }

  document.getElementById('loginSection').style.display='none';
  document.getElementById('taskFormSection').style.display='block';
  document.getElementById('taskFeed').style.display='grid';
  document.getElementById('walletSection').style.display='flex';
  document.getElementById('adminPanel').style.display = isAdmin ? 'block':'none';
}

// Other functions (postTask, performTask, testimonials) remain same as before
// For brevity, can reuse previous script logic here (task posting, tiering, progress bars, testimonials animation)
</script>

</body>
  </html>
