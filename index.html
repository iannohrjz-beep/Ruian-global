<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruian Global Network - Earn, Grow, Share</title>
<style>
body { font-family: Arial, sans-serif; background:#f2f2f2; margin:0; padding:0;}
header { background:#ff4b2b; color:#fff; padding:20px; text-align:center; font-size:2em; font-weight:bold;}
header .tagline { font-size:1.2em; font-weight:normal; margin-top:5px;}
.container { max-width:1200px; margin:20px auto; padding:0 20px;}
.tabs { display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap; }
.tab-btn { background:#ddd; border:none; padding:10px 15px; cursor:pointer; border-radius:8px; font-weight:bold;}
.tab-btn.active { background:#ff4b2b; color:#fff;}
.task-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:15px; }
.task-card { background:#fff; padding:15px; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.1); transition: transform 0.3s; position:relative;}
.task-card:hover { transform: translateY(-5px);}
.task-title { font-weight:bold; font-size:1.2em;}
.task-badge { display:inline-block; padding:3px 8px; border-radius:8px; color:#fff; font-weight:bold; margin-top:5px; font-size:0.9em;}
.low-task { background:#95a5a6;}
.medium-task { background:#3498db;}
.high-task { background:#f1c40f; color:#000;}
.vip-task { background:#e74c3c;}
.vip-glow { box-shadow:0 0 15px gold; }
.coin-animation { position:absolute; width:30px; height:30px; background: gold; border-radius:50%; animation: coinDrop 1s forwards;}
@keyframes coinDrop { 0% {transform: translateY(0) scale(0);} 50% {transform: translateY(-50px) scale(1.2);} 100% {transform: translateY(0) scale(1);} }
.admin-panel { display:none; background:#fff; padding:20px; border-radius:12px; margin-top:20px; box-shadow:0 5px 15px rgba(0,0,0,0.2);}
.admin-tabs button { margin-right:10px; padding:8px 12px; border:none; background:#ff4b2b; color:#fff; border-radius:6px; cursor:pointer; font-weight:bold;}
.admin-tab-content { display:none; margin-top:15px;}
.login-section { background:#fff; padding:20px; border-radius:12px; max-width:400px; margin:20px auto; box-shadow:0 5px 15px rgba(0,0,0,0.2);}
.login-section input { width:100%; margin:5px 0; padding:10px; border-radius:8px; border:1px solid #ccc;}
.login-section button { background:#ff4b2b; color:#fff; border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold; width:100%; margin-top:5px;}
.faqs, .settings, .language { background:#fff; padding:15px; border-radius:12px; margin-top:20px; box-shadow:0 5px 15px rgba(0,0,0,0.1);}
.language select { padding:8px; border-radius:6px; margin-top:5px;}
.testimonials { margin-top:20px; background:#fff; padding:15px; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.1); min-height:60px; text-align:center; font-style:italic;}
footer { text-align:center; padding:15px; background:#ff4b2b; color:#fff; margin-top:20px;}
</style>
</head>
<body><header>
  Ruian Global Network
  <div class="tagline">Earn. Grow. Share. Build your digital empire!</div>
</header><div class="container"><!-- Login Section --><div class="login-section" id="loginSection">
<h2>Login</h2>
<input type="email" id="loginEmail" placeholder="Enter email" autocomplete="username">
<input type="password" id="loginPassword" placeholder="Enter password" autocomplete="current-password">
<button onclick="login()">Login</button>
<button onclick="forgotPassword()">Forgot Password?</button>
