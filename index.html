<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruian Global - Task Platform</title>
<style>
body { font-family: Arial, sans-serif; background: #f2f2f2; margin:0; padding:0;}
header { 
  background: linear-gradient(-45deg, #ff4b2b, #ff416c, #1f8ef1, #43e97b); 
  color: #fff; 
  padding: 25px; 
  text-align: center; 
  font-size: 2em; 
  font-weight: bold; 
  background-size: 400% 400%; 
  animation: gradientBG 15s ease infinite;
}
@keyframes gradientBG {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
.container { max-width: 1200px; margin: 20px auto; padding: 0 20px;}
.task-feed { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;}
.task-card { 
  background: #fff; 
  padding: 15px; 
  border-radius: 12px; 
  box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
  transform: translateY(50px); 
  opacity: 0; 
  animation: slideIn 0.7s forwards; 
  transition: transform 0.3s;
}
@keyframes slideIn { to { transform: translateY(0); opacity: 1;} }
.task-card:hover { transform: translateY(-5px);}
.task-title { font-weight: bold; font-size: 1.2em;}
.task-badge { display:inline-block; padding:3px 8px; border-radius:8px; color:#fff; font-weight:bold; margin-top:5px; font-size:0.9em;}
.low-task { background: #95a5a6; }
.medium-task { background: #3498db; }
.high-task { background: #f1c40f; color:#000; animation: pulse 2s infinite;}
.vip-task { background: #e74c3c; animation: pulse 2s infinite; }
@keyframes pulse { 0% { transform: scale(1);} 50% { transform: scale(1.05);} 100% { transform: scale(1);} }
.task-details { margin: 10px 0; }
.task-action { display: flex; flex-direction: column; }
.task-action input, .task-action select { margin:5px 0; padding:5px; border-radius:5px; border:1px solid #ccc;}
.task-action button { background:#ff4b2b; color:#fff; border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold;}
.wallets { margin-top:20px; display:flex; gap:20px; justify-content:center;}
.wallet { background:#fff; padding:15px; border-radius:12px; box-shadow:0 5px 10px rgba(0,0,0,0.1); text-align:center;}
.progress-bar { background:#eee; border-radius:8px; overflow:hidden; height:15px; margin-top:5px;}
.progress { background:#ff4b2b; height:100%; width:0%; transition:0.5s;}
.testimonial-popup { 
  position: fixed; bottom: 20px; right: 20px; background: #3498db; color: #fff; padding: 15px; 
  border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); font-weight:bold; display:flex; align-items:center;
  opacity: 0; 
  transform: translateY(50px); 
  transition: all 0.5s;
}
.testimonial-avatar { width:30px; height:30px; border-radius:50%; margin-right:10px; border:2px solid #fff; }
.admin-panel { display:none; background:#fff; padding:20px; border-radius:12px; margin-bottom:20px; box-shadow:0 5px 15px rgba(0,0,0,0.2);}
</style>
</head>
<body>

<header>Ruian Global</header>
<div class="container">

<!-- Admin Panel (Only Visible to Admin) -->
<div class="admin-panel" id="adminPanel">
<h2>Admin Chamber</h2>
<p>Admin Wallet: <span id="adminWallet">0 KES</span></p>
<p>Total Tasks Posted: <span id="totalTasks">0</span></p>
<p>Total Performers: <span id="totalPerformers">0</span></p>
</div>

<!-- Poster Task Form -->
<section class="task-card">
<h2 class="task-title">Post a Task</h2>
<div class="task-action">
<label>Platform</label>
<select id="platform">
<option value="Instagram">Instagram</option>
<option value="Facebook">Facebook</option>
<option value="TikTok">TikTok</option>
<option value="YouTube Like">YouTube Like</option>
<option value="YouTube Subscriber">YouTube Subscriber</option>
<option value="YouTube View">YouTube View</option>
<option value="Viral Video">Viral Video</option>
</select>
<label>Action/Task Description</label>
<input type="text" id="taskDesc" placeholder="Enter post link or description">
<label>Number of Actions / Target</label>
<input type="number" id="targetNumber" placeholder="e.g., 250">
<label>Manual Price Tag (KES)</label>
<input type="number" id="priceTag" placeholder="Enter amount you will pay">
<button onclick="postTask()">Post Task</button>
</div>
</section>

<!-- Task Feed -->
<section class="task-feed" id="taskFeed"></section>

<!-- Performer Wallet -->
<div class="wallets">
<div class="wallet">
<h3>Performer Wallet</h3>
<span id="performerWallet">0 KES</span>
</div>
</div>

<!-- Testimonials Popup -->
<div class="testimonial-popup" id="testimonialPopup"><img src="https://i.pravatar.cc/30" class="testimonial-avatar"><span id="testimonialText"></span></div>

</div>

<script>
let adminWallet = 0;
let performerWallet = 0;
let totalTasks = 0;
let totalPerformers = 0;
const taskFeed = document.getElementById('taskFeed');
const adminPanel = document.getElementById('adminPanel');
const testimonialPopup = document.getElementById('testimonialPopup');
const testimonialText = document.getElementById('testimonialText');

// Sample testimonials
const testimonials = [
{avatar:'https://i.pravatar.cc/30?img=5', text:"John posted a task for 250 Instagram likes — completed within hours! 🎉 Changing lives!"},
{avatar:'https://i.pravatar.cc/30?img=6', text:"Maria’s TikTok video went viral — 10k views in a day! 🔥"},
{avatar:'https://i.pravatar.cc/30?img=7', text:"VIP task completed in 3 hours! 🏆 Performers earning big!"},
{avatar:'https://i.pravatar.cc/30?img=8', text:"David got 500 Facebook followers — everyone happy 😎"},
{avatar:'https://i.pravatar.cc/30?img=9', text:"Sarah’s YouTube video gained 5k views in a day! 🚀"}
];

// Platform market rates
const rates = {
'Instagram': 2,
'Facebook': 2,
'TikTok': 2,
'YouTube Like': 2,
'YouTube Subscriber': 8,
'YouTube View': 1.5,
'Viral Video': 5
};

// Show admin panel if userRole is admin
const userRole = 'admin'; // change to 'user' for public
if(userRole === 'admin'){
    adminPanel.style.display = 'block';
}

function getTier(amount){
if(amount >= 200 && amount <= 4999) return 'low-task';
else if(amount >= 5000 && amount <= 14999) return 'medium-task';
else if(amount >= 15000 && amount <= 49999) return 'high-task';
else if(amount >= 50000) return 'vip-task';
else return 'low-task';
}

function postTask(){
const platform = document.getElementById('platform').value;
const desc = document.getElementById('taskDesc').value;
const target = parseInt(document.getElementById('targetNumber').value);
const priceTag = parseFloat(document.getElementById('priceTag').value);

totalTasks++;

// Admin fee 15%
const adminFee = priceTag * 0.15;
adminWallet += adminFee;

// Amount for performers
const totalForPerformers = priceTag - adminFee;
const perActionPay = (target > 0) ? (totalForPerformers / target).toFixed(2) : 0;

// Determine tier
const tierClass = getTier(priceTag);

// Create task card
const taskCard = document.createElement('div');
taskCard.className = 'task-card';
taskCard.innerHTML = `
<div class="task-title">${desc}</div>
<span class="task-badge ${tierClass}">${tierClass.replace('-task','').toUpperCase()}</span>
<div class="task-details">
Platform: ${platform} <br>
Target Actions: ${target} <br>
Price Tag: ${priceTag} KES <br>
Per Action Payout: ${perActionPay} KES
</div>
<div class="progress-bar"><div class="progress" id="progress${taskFeed.children.length}"></div></div>
<button onclick="performTask(${target}, ${perActionPay}, 'progress${taskFeed.children.length}')">Perform Task</button>
`;
taskFeed.prepend(taskCard);

// Reset form
document.getElementById('taskDesc').value='';
document.getElementById('targetNumber').value='';
document.getElementById('priceTag').value='';

// Update admin panel if visible
if(userRole === 'admin'){
    document.getElementById('adminWallet').innerText = adminWallet.toFixed(2) + ' KES';
    document.getElementById('totalTasks').innerText = totalTasks;
}
}

// Perform task simulation
function performTask(target, perActionPay, progressId){
let completed = 0;
const progressBar = document.getElementById(progressId);
totalPerformers++;
const interval = setInterval(()=>{
if(completed < target){
completed++;
performerWallet += parseFloat(perActionPay);
progressBar.style.width = ((completed/target)*100) + '%';
document.getElementById('performerWallet').innerText = performerWallet.toFixed(2) + ' KES';
} else clearInterval(interval);
if(userRole === 'admin'){
    document.getElementById('totalPerformers').innerText = totalPerformers;
}
}, 100);
}

// Testimonials popup loop
let testIndex = 0;
function showTestimonial(){
testimonialPopup.querySelector('.testimonial-avatar').src = testimonials[testIndex].avatar;
testimonialText.innerText = testimonials[testIndex].text;
testimonialPopup.style.opacity = 1;
testimonialPopup.style.transform = 'translateY(0)';
setTimeout(()=>{
testimonialPopup.style.opacity = 0;
testimonialPopup.style.transform = 'translateY(50px)';
testIndex = (testIndex + 1) % testimonials.length;
},5000);
}
setInterval(showTestimonial,6000);

</script>

</body>
  </html>
