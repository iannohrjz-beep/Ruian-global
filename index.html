<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruian Global - Task Platform</title>
<style>
body { font-family: Arial, sans-serif; background: #f2f2f2; margin:0; padding:0;}
header { background: #ff4b2b; color: #fff; padding: 20px; text-align: center; font-size: 2em; font-weight: bold;}
.container { max-width: 1200px; margin: 20px auto; padding: 0 20px;}
.task-feed { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;}
.task-card { background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);}
.task-title { font-weight: bold; font-size: 1.2em;}
.task-badge { display:inline-block; padding:3px 8px; border-radius:8px; color:#fff; font-weight:bold; margin-top:5px; font-size:0.9em;}
.low-task { background: #95a5a6; }
.medium-task { background: #3498db; }
.high-task { background: #f1c40f; color:#000;}
.vip-task { background: #e74c3c; }
.task-details { margin: 10px 0; }
.task-action { display: flex; flex-direction: column; }
.task-action input { margin:5px 0; padding:5px; border-radius:5px; border:1px solid #ccc;}
.task-action button { background:#ff4b2b; color:#fff; border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold;}
.wallets { margin-top:20px; display:flex; gap:20px; justify-content:center;}
.wallet { background:#fff; padding:15px; border-radius:12px; box-shadow:0 5px 10px rgba(0,0,0,0.1); text-align:center;}
.progress-bar { background:#eee; border-radius:8px; overflow:hidden; height:15px; margin-top:5px;}
.progress { background:#ff4b2b; height:100%; width:0%; transition:0.5s;}
</style>
</head>
<body>

<header>Ruian Global</header>
<div class="container">

<!-- Poster Task Form -->
<section class="task-card">
<h2 class="task-title">Post a Task</h2>
<div class="task-action">
<label>Platform</label>
<select id="platform">
<option value="Instagram">Instagram</option>
<option value="Facebook">Facebook</option>
<option value="TikTok">TikTok</option>
<option value="YouTube Like">YouTube Like</option>
<option value="YouTube Subscriber">YouTube Subscriber</option>
<option value="YouTube View">YouTube View</option>
<option value="Viral Video">Viral Video</option>
</select>
<label>Action/Task Description</label>
<input type="text" id="taskDesc" placeholder="Enter post link or description">
<label>Number of Actions / Target</label>
<input type="number" id="targetNumber" placeholder="e.g., 250">
<label>Manual Price Tag (KES)</label>
<input type="number" id="priceTag" placeholder="Enter amount you will pay">
<button onclick="postTask()">Post Task</button>
</div>
</section>

<!-- Task Feed -->
<section class="task-feed" id="taskFeed">
<!-- Tasks will be dynamically added here -->
</section>

<!-- Wallets -->
<div class="wallets">
<div class="wallet">
<h3>Admin Wallet</h3>
<span id="adminWallet">0 KES</span>
</div>
<div class="wallet">
<h3>Performer Wallet</h3>
<span id="performerWallet">0 KES</span>
</div>
</div>

</div>

<script>
let adminWallet = 0;
let performerWallet = 0;
const taskFeed = document.getElementById('taskFeed');

// Platform market rates
const rates = {
'Instagram': 2,
'Facebook': 2,
'TikTok': 2,
'YouTube Like': 2,
'YouTube Subscriber': 8,
'YouTube View': 1.5,
'Viral Video': 5
};

function getTier(amount){
if(amount >= 200 && amount <= 4999) return 'low-task';
else if(amount >= 5000 && amount <= 14999) return 'medium-task';
else if(amount >= 15000 && amount <= 49999) return 'high-task';
else if(amount >= 50000) return 'vip-task';
else return 'low-task';
}

function postTask(){
const platform = document.getElementById('platform').value;
const desc = document.getElementById('taskDesc').value;
const target = parseInt(document.getElementById('targetNumber').value);
const priceTag = parseFloat(document.getElementById('priceTag').value);

// Admin fee 15%
const adminFee = priceTag * 0.15;
adminWallet += adminFee;

// Amount for performers
const totalForPerformers = priceTag - adminFee;
const perActionPay = (target > 0) ? (totalForPerformers / target).toFixed(2) : 0;
performerWallet += 0; // Will increase when performers do tasks

// Determine tier
const tierClass = getTier(priceTag);

// Create task card
const taskCard = document.createElement('div');
taskCard.className = 'task-card';
taskCard.innerHTML = `
<div class="task-title">${desc}</div>
<span class="task-badge ${tierClass}">${tierClass.replace('-task','').toUpperCase()}</span>
<div class="task-details">
Platform: ${platform} <br>
Target Actions: ${target} <br>
Price Tag: ${priceTag} KES <br>
Per Action Payout: ${perActionPay} KES
</div>
<div class="progress-bar"><div class="progress" id="progress${taskFeed.children.length}"></div></div>
<button onclick="performTask(${target}, ${perActionPay}, 'progress${taskFeed.children.length}')">Perform Task</button>
`;
taskFeed.prepend(taskCard);

// Reset form
document.getElementById('taskDesc').value='';
document.getElementById('targetNumber').value='';
document.getElementById('priceTag').value='';

// Update wallets
document.getElementById('adminWallet').innerText = adminWallet.toFixed(2) + ' KES';
}

function performTask(target, perActionPay, progressId){
let completed = 0;
const progressBar = document.getElementById(progressId);
const interval = setInterval(()=>{
if(completed < target){
completed++;
performerWallet += parseFloat(perActionPay);
progressBar.style.width = ((completed/target)*100) + '%';
document.getElementById('performerWallet').innerText = performerWallet.toFixed(2) + ' KES';
} else clearInterval(interval);
}, 100);
}
</script>

</body>
  </html>
