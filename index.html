<!DOCTYPE html>
<html>
<head>
<title>Ruian Tasks</title>

<style>

body{
font-family:Arial;
background:#f2f4f7;
margin:0;
}

/* header */

header{
background:#4CAF50;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* login card */

.container{
width:320px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#4CAF50;
color:white;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
}

/* dashboard */

.dashboard{
display:none;
padding:20px;
}

.task{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.task button{
width:auto;
padding:8px 15px;
font-size:14px;
}

/* footer */

footer{
text-align:center;
padding:20px;
font-size:14px;
color:#555;
}

</style>

<script>

function login(){
document.querySelector(".container").style.display="none";
document.querySelector(".dashboard").style.display="block";
}

</script>

</head>

<body>

<header>
Ruian Tasks
</header>

<div class="container">

<h3>Login</h3>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p style="text-align:center;margin-top:10px;">
Registration Fee: <b>49 KES</b>
</p>

</div>


<div class="dashboard">

<h3>Available Tasks</h3>

<div class="task">
<p>👍 Like a Facebook Post</p>
<p>Reward: 1 KES</p>
<button>Start Task</button>
</div>

<div class="task">
<p>📺 Watch a Video</p>
<p>Reward: 2 KES</p>
<button>Start Task</button>
</div>

<div class="task">
<p>🌐 Visit Website</p>
<p>Reward: 1 KES</p>
<button>Start Task</button>
</div>

<div class="task">
<p>💬 Comment on Post</p>
<p>Reward: 3 KES</p>
<button>Start Task</button>
</div>

</div>

<footer>

Help: 0748121890  
<br><br>

© 2026 Ruian Network

</footer>

</body>
</html>
